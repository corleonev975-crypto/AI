<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinn AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <div class="sidebar-logo-core"></div>
        </div>
        <div class="sidebar-brand-text">
          <span class="brand-xinn">Xinn</span>
          <span class="brand-ai">AI</span>
        </div>
      </div>
      <button class="sidebar-close" id="closeSidebar" aria-label="Tutup">×</button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">＋ New Chat</button>

    <div class="sidebar-search">
      <input type="text" placeholder="Cari chat" />
    </div>

    <div class="sidebar-list">
      <div class="sidebar-group-title">Hari ini</div>
      <button class="history-item">Siapa kamu?</button>
      <button class="history-item">Apa itu AI?</button>

      <div class="sidebar-group-title">Kemarin</div>
      <button class="history-item">Cara belajar AI</button>
      <button class="history-item">Contoh penggunaan AI</button>
    </div>

    <div class="sidebar-bottom">
      <button class="sidebar-bottom-btn">✨ Upgrade to Pro</button>
      <button class="sidebar-bottom-btn">👤 Login / Daftar</button>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="app" id="app">
    <header class="topbar">
      <button class="menu-btn" id="openSidebar" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="top-title">XINN AI</div>

      <div class="status-wrap">
        <button class="server-status" id="serverStatusBtn" type="button">
          <span id="statusDot">🟢</span>
          <span id="statusText">Online</span>
          <span class="caret">▾</span>
        </button>

        <div class="status-dropdown" id="statusDropdown">
          <div class="status-row">
            <span class="big-dot">🟢</span>
            <div>
              <div class="status-label online-text">Online</div>
              <div class="status-desc">Server berjalan dengan normal.</div>
            </div>
          </div>

          <div class="status-row">
            <span class="big-dot">🔴</span>
            <div>
              <div class="status-label offline-text">Offline</div>
              <div class="status-desc">Server tidak tersedia atau API key tidak ditemukan.</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="hero" id="hero">
      <div class="orb-wrap">
        <div class="orb-ring ring-1"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-ring ring-3"></div>

        <div class="orb-core">
          <div class="orb-glow"></div>
          <div class="orb-detail"></div>
          <div class="orb-hole"></div>
        </div>
      </div>

      <h1 class="hero-title"><span class="white">Xinn</span> <span class="grad">AI</span> Online</h1>
      <p class="hero-subtitle">
        Aku adalah Xinn AI cerdas, pintar,<br />
        dan bisa membantu anda.
      </p>
    </section>

    <section class="chat-container" id="chatContainer">
      <div id="chatBox"></div>
    </section>

    <section class="input-wrap">
      <div class="plus-menu-wrap">
        <button class="plus-btn" id="plusBtn" type="button">＋</button>

        <div class="plus-popup" id="plusPopup">
          <button class="plus-item">📎 Tambah file</button>
          <button class="plus-item">📷 Ambil foto</button>
          <button class="plus-item">🖼️ Pilih foto</button>
          <button class="plus-item">✨ Buat gambar</button>
        </div>
      </div>

      <div class="input-box">
        <input id="chatInput" type="text" placeholder="Ketik pesan kamu di sini..." />

        <div class="input-actions-right">
          <button class="small-btn">◎</button>
          <button class="small-btn">🎤</button>
          <button class="send-btn" id="sendBtn" type="button">↑</button>
        </div>
      </div>

      <p class="footer-note">
        Xinn AI dapat membuat kesalahan. Periksa info penting.
        <span class="info-dot">?</span>
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
            </html>
