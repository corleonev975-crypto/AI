<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinn AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <div class="sidebar-logo-core"></div>
        </div>
        <div class="sidebar-brand-text">
          <span class="brand-xinn">Xinn</span>
          <span class="brand-ai">AI</span>
        </div>
      </div>

      <button class="close-sidebar" id="closeSidebar" aria-label="Tutup">×</button>
    </div>

    <div class="sidebar-body">
      <p>Silakan login untuk melihat<br />riwayat percakapan.</p>
    </div>

    <div class="sidebar-footer">
      <span>Xinn AI System</span>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="app" id="app">
    <header class="topbar">
      <button class="menu-btn" id="openSidebar" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <section class="hero">
      <div class="orb-area">
        <div class="orb-ring ring-a"></div>
        <div class="orb-ring ring-b"></div>
        <div class="orb-ellipse ellipse-a"></div>
        <div class="orb-ellipse ellipse-b"></div>

        <div class="orb-core">
          <div class="orb-inner-glow"></div>
          <div class="orb-detail"></div>
          <div class="orb-center"></div>
        </div>
      </div>

      <h1 class="hero-title">Xinn AI Is Online</h1>
      <p class="hero-subtitle">AI Assistant Siap Membantu</p>
    </section>

    <section class="chat-wrap">
      <div class="chat-box">
        <input id="chatInput" type="text" placeholder="Tanyakan apa saja..." />

        <div class="chat-left">
          <button class="icon-btn">📎</button>
          <button class="tools-btn">⚙ Tools</button>
        </div>

        <div class="chat-right">
          <button class="icon-btn mic">🎤</button>
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
      </div>

      <p class="chat-note">
        Xinn AI dapat membuat kesalahan. Periksa info penting.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
