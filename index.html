<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Xinn AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-stars"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="app-shell">
    <header class="topbar">
      <button class="menu-btn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="brand-top">XINN AI</div>

      <div class="status-pill">
        <span class="status-dot"></span>
        <span>ONLINE</span>
      </div>
    </header>

    <section class="hero">
      <div class="orb-wrap">
        <div class="hud-line hud-line-left"></div>
        <div class="hud-line hud-line-right"></div>

        <div class="orb-ring ring-1"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-ring ring-3"></div>

        <div class="orb-core">
          <div class="orb-glow"></div>
          <div class="orb-swirl swirl-1"></div>
          <div class="orb-swirl swirl-2"></div>
          <div class="orb-swirl swirl-3"></div>

          <div class="logo-x" aria-hidden="true">
            <span></span>
            <span></span>
          </div>

          <span class="orb-particle p1"></span>
          <span class="orb-particle p2"></span>
          <span class="orb-particle p3"></span>
        </div>
      </div>

      <h1 class="hero-title">
        <span class="title-main">Xinn</span>
        <span class="title-accent">AI</span>
      </h1>

      <div class="title-divider">
        <span></span>
        <i></i>
        <span></span>
      </div>

      <p class="hero-subtitle">
        AI Assistant yang selalu siap membantu kapan saja, di mana saja.
      </p>
    </section>

    <section class="chat-log" id="chatLog" aria-live="polite"></section>

    <section class="wave-wrap">
      <span class="wave wave-1"></span>
      <span class="wave wave-2"></span>
      <span class="wave wave-3"></span>
    </section>

    <section class="composer-section">
      <form class="composer-box" id="chatForm">
        <input id="chatInput" type="text" placeholder="Ketik pesan kamu di sini..." autocomplete="off" />

        <div class="composer-left">
          <button class="icon-btn" type="button" aria-label="Attachment">📎</button>
          <button class="tools-btn" type="button">◫ Tools</button>
        </div>

        <div class="composer-right">
          <button class="icon-btn mic-btn" type="button" aria-label="Mic">🎤</button>
          <button class="send-btn" id="sendBtn" type="submit" aria-label="Send">➤</button>
        </div>
      </form>

      <p class="footer-note">
        Xinn AI dapat membuat kesalahan. Periksa info penting.
        <span class="info-dot">i</span>
      </p>
    </section>
  </main>

  <template id="messageTemplate">
    <article class="message">
      <div class="message-role"></div>
      <div class="message-content"></div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
